  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#15171c;min-height:100vh;font-family:'Pretendard',sans-serif;
    color:#e8eaed;display:flex;justify-content:center;padding:28px;
  }
  .layout{display:flex;gap:30px;align-items:flex-start;max-width:1640px;width:100%;}

  /* ---------- panel ---------- */
  .panel{
    width:340px;flex:none;background:#1e2128;border:1px solid #2c313b;
    border-radius:16px;padding:22px 20px 26px;position:sticky;top:28px;
    max-height:calc(100vh - 56px);overflow-y:auto;
  }
  .panel h1{font-size:17px;font-weight:800;letter-spacing:.02em;margin-bottom:4px;color:#fff;}
  .panel .sub{font-size:12px;color:#7e8794;margin-bottom:20px;line-height:1.5;}
  .field{margin-bottom:17px;}
  .field>label{display:block;font-size:12px;font-weight:700;color:#aeb6c2;margin-bottom:7px;letter-spacing:.02em;}
  .field input[type=text],.field textarea,.field select{
    width:100%;background:#262a32;border:1px solid #353b46;border-radius:9px;
    color:#f0f2f5;font-family:inherit;font-size:13px;padding:9px 11px;outline:none;transition:border-color .15s;
  }
  .field input[type=text]:focus,.field textarea:focus,.field select:focus{border-color:#5b8dd6;}
  .field textarea{resize:vertical;min-height:74px;line-height:1.5;}
  .hint-sm{font-size:11px;color:#6c7480;margin-top:6px;line-height:1.45;}
  .row{display:flex;gap:8px;}.row>*{flex:1;min-width:0;}
  .seg-label{font-size:11px;color:#7e8794;margin-bottom:5px;display:block;}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:#3a4150;border-radius:3px;outline:none;margin-top:3px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#6ea0e6;cursor:pointer;border:2px solid #1e2128;}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#6ea0e6;cursor:pointer;border:2px solid #1e2128;}
  .range-head{display:flex;justify-content:space-between;align-items:baseline;}
  .range-head .val{font-size:11px;color:#8d96a3;font-variant-numeric:tabular-nums;}
  .upload-btn{display:block;width:100%;text-align:center;cursor:pointer;background:#2f3947;border:1px dashed #46505f;color:#c4ccd6;border-radius:9px;padding:13px;font-size:13px;font-weight:600;transition:background .15s,border-color .15s;}
  .upload-btn:hover{background:#374252;border-color:#5b8dd6;}
  .upload-btn input{display:none;}
  .divider-h{height:1px;background:#2c313b;margin:20px 0 18px;}
  .actions{display:flex;gap:9px;margin-top:22px;}
  .actions button{flex:1;border:none;border-radius:9px;padding:11px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:filter .15s;}
  .actions button:hover{filter:brightness(1.1);}
  #downloadBtn{background:#5b8dd6;color:#fff;}
  #resetBtn{background:#333a45;color:#c4ccd6;flex:0 0 90px;}

  /* ---------- preview ---------- */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:0;}
  .preview-vp{width:100%;max-width:760px;overflow:hidden;}
  .preview-scaler{transform-origin:top left;}
  .stage-hint{font-size:12px;color:#646d79;}

  /* ============================================================
     CARD  — 1139 x 810  (exactly half of 2278 x 1620)
     Spacings = % of 810, matching HECATE_card.html.
     ============================================================ */
  .card{
    --bg-img:none;
    position:relative;width:1139px;height:810px;border-radius:14px;overflow:hidden;
    background-image:
      linear-gradient(180deg, rgba(2,4,8,.78) 0%, rgba(2,4,8,.52) 22%, rgba(2,4,8,.55) 55%, rgba(2,4,8,.80) 78%, rgba(2,4,8,.90) 100%),
      var(--bg-img);
    background-size:cover;background-position:50% 18%;
    display:flex;flex-direction:column;align-items:center;
    color:#fff;text-align:center;user-select:none;
  }
  .card::after{content:"";position:absolute;inset:0;background:rgba(3,5,10,.28);pointer-events:none;}
  .card>*{position:relative;z-index:1;}

  .coming{
    margin-top:7.2%;font-size:29.6px;font-weight:700;letter-spacing:.19em;text-indent:.19em;
    color:rgba(233,233,234,.72);text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  /* divider: a wrapper holds a faded line drawn with a gradient.
     html-to-image renders element backgrounds reliably; we keep the
     gradient but on a dedicated full-opacity element so it never drops. */
  .divider{width:88%;height:2px;margin-top:3.2%;position:relative;}
  .divider::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.55) 50%, rgba(255,255,255,0) 100%);
  }
  .newchar{
    margin-top:6.2%;font-size:67px;font-weight:900;letter-spacing:.005em;line-height:1.05;
    color:rgba(232,235,236,.92);-webkit-text-stroke:0px rgba(232,235,236,.92);
    text-shadow:0 0 26px rgba(220,235,255,.5),0 0 10px rgba(255,255,255,.35);
  }
  .title{
    margin-top:3.2%;font-size:98px;font-weight:900;letter-spacing:.04em;line-height:1.06;
    color:#fff;-webkit-text-stroke:0px #fff;word-break:break-word;
    text-shadow:0 0 42px rgba(235,244,255,.6),0 0 24px rgba(245,250,255,.52),0 0 12px rgba(255,255,255,.45),0 0 5px rgba(255,255,255,.4);
  }
  .div2{margin-top:6.5%;}
  .spacer{flex:1 1 auto;min-height:0;}
  .label{
    margin-top:auto;
    display:flex;align-items:center;justify-content:center;gap:.5em;
    font-family:'NotoLabel','Noto Sans KR',sans-serif;font-size:30px;font-weight:700;color:#fff;
    text-shadow:0 0 14px rgba(220,235,255,.45),0 0 6px rgba(255,255,255,.35),0 1px 4px rgba(0,0,0,.55);
  }
  .label .key{font-size:1.05em;font-family:'Pretendard',sans-serif;}
  .caption{
    margin-top:3.4%;margin-bottom:5.5%;width:92%;font-size:26px;font-style:italic;font-weight:400;
    line-height:1.5;color:rgba(224,227,233,.9);text-shadow:0 1px 4px rgba(0,0,0,.55);
  }

  @media (max-width:1080px){
    body{flex-direction:column;align-items:center;}
    .layout{flex-direction:column;align-items:center;}
    .panel{position:static;width:100%;max-width:520px;max-height:none;}
  }
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h1>캐릭터 카드 생성기</h1>
    <div class="sub">헤카테 카드와 동일한 스타일로 새 카드를 만들어요. 이미지와 텍스트만 바꾸면 됩니다.</div>

    <div class="field">
      <label>캐릭터 이미지</label>
      <label class="upload-btn">이미지 업로드<input type="file" id="imgInput" accept="image/*"></label>
    </div>
    <div class="field">
      <div class="range-head"><label style="margin:0">이미지 확대</label><span class="val" id="zoomVal">100%</span></div>
      <input type="range" id="zoom" min="100" max="280" value="100">
    </div>
    <div class="field">
      <div class="range-head"><label style="margin:0">가로 위치</label><span class="val" id="posxVal">50%</span></div>
      <input type="range" id="posx" min="0" max="100" value="50">
    </div>
    <div class="field">
      <div class="range-head"><label style="margin:0">세로 위치</label><span class="val" id="posyVal">18%</span></div>
      <input type="range" id="posy" min="0" max="100" value="18">
    </div>

    <div class="divider-h"></div>

    <div class="field">
      <label>코드네임</label>
      <input type="text" id="codename" value="" autocomplete="off">
    </div>

    <div class="divider-h"></div>

    <div class="field">
      <label>속성 라벨</label>
      <input type="text" id="emojiCustom" value="" placeholder="이모지 (예: 🔱 ⚡ 🔥)" autocomplete="off">
      <div class="hint-sm">앞에 들어갈 이모지를 자유롭게 입력하세요. 비워두면 이모지 없이 나옵니다.</div>
    </div>
    <div class="field">
      <div class="row">
        <div><span class="seg-label">등급</span>
          <select id="grade"><option>S</option><option selected>A</option><option>B</option><option>C</option></select></div>
        <div><span class="seg-label">속성</span>
          <select id="attr"><option>무</option><option>번개</option><option>풀</option><option>물</option><option>얼음</option><option>불</option><option>바람</option></select></div>
        <div><span class="seg-label">타입</span>
          <select id="type"><option>가이드</option><option>센티넬</option></select></div>
      </div>
    </div>

    <div class="divider-h"></div>

    <div class="field">
      <label>캐치프레이즈</label>
      <textarea id="caption"></textarea>
    </div>

    <div class="actions">
      <button id="resetBtn">초기화</button>
      <button id="downloadBtn">PNG 저장</button>
    </div>
  </div>

  <div class="stage">
    <div class="preview-vp">
      <div class="preview-scaler" id="scaler">
        <div class="card" id="card">
          <div class="coming">COMING SOON</div>
          <div class="divider"></div>
          <div class="newchar">new character</div>
          <div class="title" id="cTitle"> </div>
          <div class="divider div2"></div>
          <div class="spacer"></div>
          <div class="label" id="cLabel"><span class="key" id="cKey" style="display:none"></span><span id="cLabelText"></span></div>
          <div class="caption" id="cCaption"></div>
        </div>
      </div>
    </div>
    <div class="stage-hint">미리보기와 저장본은 완전히 동일합니다 · 저장 크기 2278×1620</div>
  </div>
</div>

<script>
  const DEFAULT_BG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
  const card = document.getElementById('card');
  const scaler = document.getElementById('scaler');
  const vp = document.querySelector('.preview-vp');
  let bgData = DEFAULT_BG, zoom=100, posx=50, posy=18;

  function fitPreview(){
    const w = vp.clientWidth, s = w/1139;
    scaler.style.transform = 'scale('+s+')';
    vp.style.height = (810*s)+'px';
  }
  window.addEventListener('resize', fitPreview);

  function applyBg(){
    const grad = 'linear-gradient(180deg, rgba(2,4,8,.78) 0%, rgba(2,4,8,.52) 22%, rgba(2,4,8,.55) 55%, rgba(2,4,8,.80) 78%, rgba(2,4,8,.90) 100%)';
    card.style.backgroundImage = grad + ', url("' + bgData + '")';
    card.style.backgroundSize = zoom===100 ? 'cover, cover' : ('auto, '+zoom+'% auto');
    card.style.backgroundPosition = '50% 18%, '+posx+'% '+posy+'%';
  }

  document.getElementById('imgInput').addEventListener('change', e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>{ bgData=ev.target.result; applyBg(); }; r.readAsDataURL(f);
  });

  const zoomEl=document.getElementById('zoom'),posxEl=document.getElementById('posx'),posyEl=document.getElementById('posy');
  zoomEl.oninput=()=>{zoom=+zoomEl.value;zoomVal.textContent=zoom+'%';applyBg();};
  posxEl.oninput=()=>{posx=+posxEl.value;posxVal.textContent=posx+'%';applyBg();};
  posyEl.oninput=()=>{posy=+posyEl.value;posyVal.textContent=posy+'%';applyBg();};

  const codenameEl=document.getElementById('codename');
  codenameEl.oninput=()=>{cTitle.textContent=codenameEl.value||' ';};

  const emojiEl=document.getElementById('emojiCustom');
  const gradeEl=document.getElementById('grade'),attrEl=document.getElementById('attr'),typeEl=document.getElementById('type');
  function updateLabel(){
    const em=emojiEl.value.trim(), key=document.getElementById('cKey');
    if(em){key.textContent=em;key.style.display='inline';} else {key.textContent='';key.style.display='none';}
    document.getElementById('cLabelText').textContent=`${gradeEl.value}급 ${attrEl.value}속성 ${typeEl.value}`;
  }
  emojiEl.oninput=updateLabel;
  [gradeEl,attrEl,typeEl].forEach(el=>el.onchange=updateLabel);

  const capEl=document.getElementById('caption');
  capEl.oninput=()=>{cCaption.textContent='"'+capEl.value+'"';};

  document.getElementById('resetBtn').onclick=()=>{
    bgData=DEFAULT_BG;zoom=100;posx=50;posy=18;
    zoomEl.value=100;posxEl.value=50;posyEl.value=18;
    zoomVal.textContent='100%';posxVal.textContent='50%';posyVal.textContent='18%';applyBg();
  };

  // ---- DOWNLOAD: clone the card OFF preview-scaler at full 1139x810, capture ----
  document.getElementById('downloadBtn').onclick=async()=>{
    const btn=document.getElementById('downloadBtn'); const prev=btn.textContent;
    btn.textContent='저장 중...'; btn.disabled=true;
    // build an off-screen, unscaled clone at native size
    const holder=document.createElement('div');
    holder.style.cssText='position:fixed;left:-99999px;top:0;width:1139px;height:810px;background:#000;';
    const clone=card.cloneNode(true);
    clone.style.transform='none';
    clone.style.margin='0';
    holder.appendChild(clone);
    document.body.appendChild(holder);
    try{
      await (document.fonts ? document.fonts.ready : Promise.resolve());
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      const dataUrl=await modernScreenshot.domToPng(clone,{
        width:1139, height:810,
        scale:2,                 // -> 2278 x 1620
        backgroundColor:'#000',
        style:{margin:'0',transform:'none'}
      });
      const a=document.createElement('a');
      a.download=(codenameEl.value||'card').trim().replace(/\s+/g,'_')+'_card.png';
      a.href=dataUrl;a.click();
    }catch(err){alert('저장 중 오류가 발생했어요: '+err.message);}
    finally{ holder.remove(); btn.textContent=prev; btn.disabled=false; }
  };

  applyBg(); fitPreview();
</script>
</body>
</html>
